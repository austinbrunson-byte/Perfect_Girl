<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Perfect Girl">
<meta name="theme-color" content="#12040c">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="mask-icon" href="icon.svg" color="#ff4f9a">
<title>Perfect Girl</title>
<style>
  :root{
    --bg:#12040c; --bg2:#1c0812; --card:#221019; --ink:#fff4f8; --dim:#c79bb0;
    --pink:#ff4f9a; --pink2:#ff86bd; --green:#2fd16a; --red:#ff3b5c; --gold:#ffd23f;
    --disp:"Georgia","Times New Roman",serif;
    --body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    background:radial-gradient(120% 90% at 50% -10%,#3a0f26 0%,var(--bg2) 45%,var(--bg) 100%);
    color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;
    min-height:100dvh;overflow-x:hidden;
  }
  .wrap{max-width:480px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 14px) 16px calc(env(safe-area-inset-bottom) + 18px);min-height:100dvh;display:flex;flex-direction:column}

  /* ---- header ---- */
  header{text-align:center;margin-bottom:8px;flex:0 0 auto}
  .logo{font-family:var(--disp);font-weight:700;font-size:30px;letter-spacing:.5px;line-height:1;
    background:linear-gradient(180deg,#fff 0%,var(--pink2) 60%,var(--pink) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 2px 22px rgba(255,79,154,.35)}
  .logo .heart{-webkit-text-fill-color:var(--pink);filter:drop-shadow(0 0 8px rgba(255,79,154,.6))}
  .sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-top:6px}

  /* ---- progress ---- */
  .bar{height:5px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin:12px 2px 4px}
  .bar > i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--pink),var(--gold));transition:width .35s ease}
  .count{font-size:11px;color:var(--dim);text-align:center;letter-spacing:1px;margin-bottom:10px}

  /* ---- card ---- */
  .stage{flex:1 1 auto;display:flex;align-items:center;justify-content:center;position:relative}
  .card{
    width:100%;background:linear-gradient(180deg,var(--card),#190b12);
    border:1px solid rgba(255,255,255,.08);border-radius:26px;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.55),0 0 0 1px rgba(255,79,154,.08) inset;
    transition:transform .32s cubic-bezier(.2,.7,.3,1),opacity .32s ease;
    will-change:transform,opacity;
  }
  .card.out-yes{transform:translateX(120%) rotate(14deg);opacity:0}
  .card.out-no{transform:translateX(-120%) rotate(-14deg);opacity:0}
  .card.in{animation:pop .4s cubic-bezier(.2,.8,.3,1)}
  @keyframes pop{from{transform:scale(.94) translateY(10px);opacity:0}to{transform:none;opacity:1}}

  .photo{position:relative;width:100%;aspect-ratio:4/5;background:#2a1420 center/cover no-repeat}
  .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .photo::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(18,4,12,0) 45%,rgba(18,4,12,.9) 100%)}
  .badge{position:absolute;top:12px;left:12px;z-index:2;background:rgba(255,79,154,.92);color:#2a0316;
    font-weight:800;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 11px;border-radius:99px;backdrop-filter:blur(4px)}
  .stamp{position:absolute;top:18px;z-index:3;font-family:var(--disp);font-weight:800;font-size:34px;letter-spacing:2px;
    text-transform:uppercase;padding:4px 14px;border:4px solid;border-radius:12px;opacity:0;transform:rotate(-16deg) scale(1.2);transition:opacity .12s}
  .stamp.yes{right:16px;color:var(--green);border-color:var(--green);text-shadow:0 2px 10px rgba(47,209,106,.4)}
  .stamp.no{left:16px;color:var(--red);border-color:var(--red);text-shadow:0 2px 10px rgba(255,59,92,.4)}

  .prompt{padding:16px 20px 20px}
  .lead{font-family:var(--disp);font-style:italic;color:var(--pink2);font-size:16px;margin-bottom:4px}
  .issue{font-size:20px;line-height:1.32;font-weight:600}

  /* ---- buttons ---- */
  .btns{display:flex;gap:14px;margin-top:16px;flex:0 0 auto}
  .btn{flex:1;border:none;border-radius:18px;padding:16px 10px;font-size:16px;font-weight:800;letter-spacing:.5px;
    cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 10px 26px rgba(0,0,0,.4);transition:transform .08s ease,filter .15s ease}
  .btn:active{transform:scale(.95)}
  .btn .ico{font-size:20px}
  .btn.no{background:linear-gradient(180deg,#ff506e,#d21e3d)}
  .btn.yes{background:linear-gradient(180deg,#3ee07b,#1fae56)}
  .hint{text-align:center;font-size:11px;color:var(--dim);margin-top:12px;letter-spacing:.5px}

  /* ---- results ---- */
  .results{display:none;text-align:center;padding:8px 4px 0;animation:pop .5s ease}
  .results.show{display:block}
  .verdict{font-family:var(--disp);font-size:26px;font-weight:700;line-height:1.15;margin:6px 0 4px;
    background:linear-gradient(180deg,#fff,var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent}
  .big{font-family:var(--disp);font-weight:800;font-size:72px;line-height:1;margin:10px 0 2px;color:var(--gold);text-shadow:0 4px 24px rgba(255,210,63,.35)}
  .biglabel{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
  .rblurb{font-size:15px;line-height:1.5;color:var(--ink);margin:16px auto;max-width:340px}
  .rrow{display:flex;gap:12px;justify-content:center;margin:18px 0 6px}
  .stat{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px 6px;max-width:130px}
  .stat b{display:block;font-size:26px;font-family:var(--disp)}
  .stat span{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--dim)}
  .again{margin-top:22px;width:100%;border:none;border-radius:18px;padding:16px;font-size:16px;font-weight:800;color:#2a0316;
    background:linear-gradient(180deg,var(--pink2),var(--pink));cursor:pointer;box-shadow:0 12px 30px rgba(255,79,154,.35)}
  .again:active{transform:scale(.97)}
  footer{text-align:center;font-size:10px;color:rgba(199,155,176,.6);margin-top:14px;letter-spacing:1px}

  /* ---- tabs ---- */
  [hidden]{display:none !important}
  .tabs{display:flex;gap:8px;justify-content:center;margin:12px 0 2px;flex:0 0 auto}
  .tab{appearance:none;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--dim);
    font-weight:800;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:8px 18px;border-radius:99px;
    cursor:pointer;transition:background .15s ease,color .15s ease,border-color .15s ease}
  .tab.active{background:linear-gradient(180deg,var(--pink2),var(--pink));color:#2a0316;border-color:transparent}
  #playView,#trainView{flex:1 1 auto;display:flex;flex-direction:column;min-height:0}

  /* ---- train card ---- */
  .card.text-only{position:relative}
  .card.text-only .prompt{min-height:290px;display:flex;flex-direction:column;justify-content:center;padding:30px 26px}
  .card.text-only .lead{font-size:17px;margin-bottom:10px}
  .card.text-only .issue{font-size:23px;line-height:1.36}

  /* ---- train results / export ---- */
  .exportbtns{display:flex;gap:10px;margin:14px 0 4px}
  .btn.ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);box-shadow:none;color:var(--ink);
    padding:13px 10px;font-size:14px}
  .btn.ghost:active{transform:scale(.96)}
  .again.ghost2{background:rgba(255,255,255,.06);color:var(--ink);box-shadow:none;margin-top:10px}
  .linkbtn{background:none;border:none;color:var(--pink2);font:inherit;cursor:pointer;text-decoration:underline;padding:0}
  .tlists{text-align:left;max-height:230px;overflow-y:auto;margin:14px 0 4px;display:flex;flex-direction:column;gap:14px}
  .tlist-h{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--pink2);margin-bottom:4px;
    position:sticky;top:0;background:var(--bg2);padding:4px 0}
  .tlist-i{font-size:13px;line-height:1.4;color:var(--ink);padding:5px 2px;border-bottom:1px solid rgba(255,255,255,.05)}
  .tlist-note{color:var(--dim);font-size:12px;font-style:italic;margin-top:3px;line-height:1.35}
  #trainView .rrow{flex-wrap:wrap}

  /* ---- maybe (swipe up + note) ---- */
  .card.text-only{touch-action:none}
  .card.out-up{transform:translateY(-120%) rotate(-6deg);opacity:0}
  .stamp.maybe{left:50%;top:14px;transform:translateX(-50%) rotate(-8deg) scale(1.2);
    color:var(--gold);border-color:var(--gold);text-shadow:0 2px 10px rgba(255,210,63,.4)}
  .btn.maybe{background:linear-gradient(180deg,#ffdf6b,#f0b400);color:#2a1a00}
  .note{display:none;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
    border-radius:18px;padding:14px;margin-top:14px;text-align:left;flex:0 0 auto}
  .note-q{font-family:var(--disp);font-style:italic;color:var(--pink2);font-size:14px;line-height:1.35;margin-bottom:10px}
  .note textarea{width:100%;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.14);border-radius:12px;
    color:var(--ink);font:inherit;font-size:15px;padding:10px 12px;resize:vertical;min-height:92px}
  .note textarea:focus{outline:2px solid var(--pink);outline-offset:1px}
  .note-btns{display:flex;gap:10px;margin-top:10px}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">Perfect Girl <span class="heart">♥</span></div>
      <div class="sub">Would you still say yes?</div>
    </header>

    <div class="tabs">
      <button class="tab active" data-mode="play">Play</button>
      <button class="tab" data-mode="train">Train</button>
    </div>

    <section id="playView">
    <div class="bar"><i id="fill"></i></div>
    <div class="count" id="count"></div>

    <div class="stage">
      <!-- swiping deck -->
      <div class="card in" id="card">
        <div class="photo">
          <div class="badge">Perfect Girl</div>
          <div class="stamp yes" id="stampYes">Yes</div>
          <div class="stamp no" id="stampNo">No</div>
          <img id="photo" alt="Perfect girl" src="">
        </div>
        <div class="prompt">
          <div class="lead">Perfect girl, but…</div>
          <div class="issue" id="issue"></div>
        </div>
      </div>

      <!-- results -->
      <div class="results" id="results">
        <div class="big" id="roachPct">0%</div>
        <div class="biglabel">compatibility</div>
        <div class="verdict" id="verdict"></div>
        <div class="rblurb" id="rblurb"></div>
        <div class="rrow">
          <div class="stat"><b id="sYes">0</b><span>said yes</span></div>
          <div class="stat"><b id="sNo">0</b><span>said no</span></div>
        </div>
        <button class="again" id="again">Start over</button>
      </div>
    </div>

    <div class="btns" id="btns">
      <button class="btn no" id="btnNo"><span class="ico">✕</span> No</button>
      <button class="btn yes" id="btnYes"><span class="ico">♥</span> Yes</button>
    </div>
    <div class="hint" id="hint">Tap Yes or No · or swipe the card</div>
    </section>

    <section id="trainView" hidden>
      <div class="bar"><i id="tfill"></i></div>
      <div class="count" id="tcount"></div>

      <div class="stage">
        <div class="card text-only in" id="tcard">
          <div class="stamp yes" id="tStampGood">Good</div>
          <div class="stamp no" id="tStampBad">Bad</div>
          <div class="stamp maybe" id="tStampMaybe">Maybe</div>
          <div class="prompt">
            <div class="lead">Perfect girl, but…</div>
            <div class="issue" id="tissue"></div>
          </div>
        </div>

        <div class="results" id="tresults">
          <div class="verdict">Your ratings</div>
          <div class="rrow">
            <div class="stat"><b id="tGood">0</b><span>good</span></div>
            <div class="stat"><b id="tMaybe">0</b><span>maybe</span></div>
            <div class="stat"><b id="tBad">0</b><span>bad</span></div>
            <div class="stat"><b id="tRest">0</b><span>unrated</span></div>
          </div>
          <div class="exportbtns">
            <button class="btn ghost" id="tCopy">Copy JSON</button>
            <button class="btn ghost" id="tDownload">Download</button>
          </div>
          <div class="tlists" id="tlists"></div>
          <button class="again" id="tResume">Rate again</button>
          <button class="again ghost2" id="tReset">Reset ratings</button>
        </div>
      </div>

      <div class="note" id="tnote">
        <div class="note-q" id="tnoteQ"></div>
        <textarea id="tnoteText" placeholder="What works, what doesn't…"></textarea>
        <div class="note-btns">
          <button class="btn ghost" id="tnoteCancel">Cancel</button>
          <button class="btn yes" id="tnoteSave">Save maybe</button>
        </div>
      </div>

      <div class="btns" id="tbtns">
        <button class="btn no" id="btnBad"><span class="ico">✕</span> Bad</button>
        <button class="btn maybe" id="btnMaybe"><span class="ico">?</span> Maybe</button>
        <button class="btn yes" id="btnGood"><span class="ico">♥</span> Good</button>
      </div>
      <div class="hint" id="thint">Swipe or tap · left bad · up maybe · right good · <button class="linkbtn" id="tExport">see ratings ▸</button></div>
    </section>
    <footer>Photos via Unsplash</footer>
  </div>

<script>
/* Free-to-use portrait photos (Unsplash License). */
const PHOTOS = [
  "https://images.unsplash.com/photo-1494790108377-be9c29b29330",
  "https://images.unsplash.com/photo-1438761681033-6461ffad8d80",
  "https://images.unsplash.com/photo-1544005313-94ddf0286df2",
  "https://images.unsplash.com/photo-1517841905240-472988babdf9",
  "https://images.unsplash.com/photo-1524250502761-1ac6f2e30d43",
  "https://images.unsplash.com/photo-1489424731084-a5d8b219a5bb",
  "https://images.unsplash.com/photo-1509967419530-da38b4704bc6",
  "https://images.unsplash.com/photo-1502823403499-6ccfcf4fb453",
  "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91",
  "https://images.unsplash.com/photo-1531123897727-8f129e1688ce",
  "https://images.unsplash.com/photo-1487412720507-e7ab37603c6f",
  "https://images.unsplash.com/photo-1534528741775-53994a69daeb"
];
const IMG_Q = "?auto=format&fit=crop&w=640&h=800&q=80";
// inline fallback if a photo fails to load — varied per card so a deck of
// placeholders (e.g. offline) still looks intentional rather than broken.
const FB_TOPS = ["#ff86bd","#ffd23f","#8f6bff","#4fd1c5","#ff9e6b","#6bb8ff","#ff6b9d","#7ee081"];
function fallbackFor(i){
  const top = FB_TOPS[i % FB_TOPS.length];
  return "data:image/svg+xml;utf8," + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="640" height="800"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="'+top+'"/><stop offset="1" stop-color="#3a0f26"/></linearGradient></defs><rect width="640" height="800" fill="url(#g)"/><text x="320" y="440" font-size="150" text-anchor="middle" fill="#fff4f8">♥</text></svg>'
  );
}

/* The prompts. One register only: deadpan — flat, specific, stated as fact.
   Roughly 70% involve roaches; the rest are ordinary dealbreakers and a few
   other anomalies. No punchlines, no winks, nothing that announces itself. */
const ISSUES = [
  /* ---------- roaches (~70%) ---------- */
  "every time she flushes the toilet, a roach spawns somewhere in the house.",
  "for one minute every month she turns into a roach. At random.",
  "she can telepathically command every roach within a five-mile radius.",
  "when startled, she hisses exactly like a Madagascar hissing roach.",
  "she can flatten herself to slide under the bedroom door at 3 a.m. for no reason.",
  "she glows faintly under UV light, and so do the roaches quietly following her.",
  "every text she sends autocorrects exactly one word to \"roach.\"",
  "she can only fall asleep to the gentle skittering of roaches in the walls.",
  "every kiss tastes faintly of the inside of a kitchen cabinet.",
  "she skitters straight up the wall the instant she hears the vacuum turn on.",
  "every cabinet in her home has a 0.5% chance, when opened, of containing one roach standing upright, waiting.",
  "one of her molars is a roach preserved in amber. No dentist has ever mentioned it.",
  "her laugh, if sustained past 10 seconds, summons exactly one roach.",
  "every printed photo of her contains one roach that was not in the digital file.",
  "between 2:00 and 2:04 a.m. her shadow has antennae.",
  "if a roach dies within 10 meters of her, she pauses mid-sentence for a moment of silence, then resumes.",
  "she keeps one roach in a terrarium named after your father. She will not elaborate.",
  "her perfume attracts exactly one roach per wear. It never reaches her. It dies trying.",
  "gifts she wraps have a 5% chance of including one bonus item: a roach.",
  "her heartbeat, played at 4× speed, is audibly roach wings.",
  "at midnight on her birthday, every roach in the building faces her for 60 seconds.",
  "once per relationship, at a moment of her choosing, she makes eye contact and eats a roach like a chip. Neither of you will ever speak of it.",
  "when she blows out birthday candles, every roach in earshot loses one day of lifespan.",
  "saying \"roach\" three times in her presence makes her whisper \"where\" in a voice that is not hers.",
  "her sneeze is contagious to roaches only.",
  "she has an elaborate personalized handshake with one specific roach. You have witnessed it twice.",
  "1% of the rice in any dish she cooks is technically roach. Which 1% is never disclosed.",
  "4% of her hair is antenna.",
  "she is exactly one roach heavier than her stated weight.",
  "roaches cannot die inside her home.",
  "her resting body temperature is the optimal temperature for roach egg incubation.",
  "ice from her freezer has a 10% roach inclusion rate.",
  "under sodium-vapor streetlight her shadow is anatomically a roach's.",
  "under 400× magnification her fingerprints are roaches.",
  "every mirror she owns reflects one roach not present in the room.",
  "roaches within 3 meters match her walking cadence.",
  "each of her houseplants contains one roach in a supervisory role.",
  "her apartment has one door that is 4 inches tall. It is load-rated.",
  "once per year one of her teeth is a roach. Duration: 11 seconds.",
  "expiration dates in her pantry are given in roach years.",
  "she receives approximately one piece of mail per quarter addressed to a roach.",
  "her Wi-Fi password is the sound a roach makes. It cannot be typed.",
  "her handwriting, rotated 90 degrees, is a roach.",
  "her CPR certification was issued by roaches. It remains valid.",
  "her diploma is co-signed by a roach. The registrar confirms this is standard.",
  "5% of the time you reach into her popcorn, your fingers close on something that closes back.",
  "flipping her pillow to the cool side carries a 3% chance of one roach, pressed flat, alive.",
  "5% of the time she asks you to unzip her dress, the zipper pauses on something with mass.",
  "sharing a straw with her carries a 2% chance the straw is already occupied.",
  "the last sip from her water bottle contains legs 1% of the time.",
  "her left earbud is occupied 3% of the time. Discovery occurs at insertion.",
  "her lip balm has a 1% chance per use of one fine antenna set into the surface.",
  "once per month a roach exits her sleeve mid-hug, crosses to your shoulder, and stays.",
  "holding her hand in a dark theater carries a 2% chance of something crossing your wrist, sleeve to sleeve.",
  "playing with her hair carries a 2% chance of brief coordinated movement against your fingertips.",
  "her bath towel releases one roach when unfolded, 6% of the time. The roach is damp.",
  "her laundry averages one live roach per 200 garments, discovered warm, during folding.",
  "eggs she cracks contain a roach in place of the yolk at a rate of 1 in 500.",
  "1% of mornings your toothbrush holds a single roach leg among the bristles.",
  "5% of the time you borrow her phone, the back is warm in the shape of a roach.",
  "she bites her nails. All ten. Including that one.",
  "sharing a blanket with her carries a 3% chance of a third occupant. Position never determined.",
  "her morning breath, 4% of days, is the smell of the space behind a refrigerator.",
  "her mattress weighs 3 pounds over manufacturer spec. The discrepancy is distributed.",
  "her dryer's lint trap yields one intact wing per load.",
  "kissing her neck carries a 4% chance of coinciding with a crossing beneath her collar.",
  "the guest slippers at her apartment have a 10% occupancy rate. Discovery is toe-first.",

  /* ---------- Shaq ---------- */
  "for eleven seconds each morning she is Shaquille O'Neal — height, reach, and voice included. Then it passes.",
  "she is 7 feet 1 inch tall. The day you met her she was not.",
  "she has attempted four thousand free throws in her life and made none of them.",
  "her shoe size is 22. The shoes are always precisely where you step in the dark.",
  "she can hold your entire head in one hand. She does this while you are talking.",
  "she breaks one backboard a year. She does not play basketball.",

  /* ---------- insurance ---------- */
  "she knows your auto policy number. You have never told anyone your auto policy number.",
  "she can save you 15% on car insurance. You do not own a car.",
  "at 6:14 each morning she states a monthly premium aloud, then goes back to sleep.",
  "she quotes you a rate for a vehicle you have not purchased yet. The rate is correct.",
  "her voicemail greeting is a coverage quote. It updates with the market.",

  /* ---------- ordinary dealbreakers ---------- */
  "she leaves wet towels on the bed. Every morning. You have discussed it.",
  "she has never once been on time.",
  "she still texts her ex. Only on his birthday, but every birthday.",
  "she keeps the apartment at 61 degrees year-round and will not negotiate.",
  "she chews with her mouth open and cannot hear it.",
  "she has forty thousand dollars of debt she has not mentioned.",
  "she does not want children. You have not told her that you do.",
  "she narrates every movie you watch together, start to finish.",
  "she is close with her mother. They speak nine times a day.",
  "she saves nothing. Every dollar arrives and leaves the same afternoon.",
  "she corrects your grammar in front of other people.",
  "she has three cats and is getting a fourth. You are allergic.",
  "she takes phone calls on speaker in public, always.",

  /* ---------- other anomalies ---------- */
  "2% of her freckles are load-bearing.",
  "her left ear runs 3 milliseconds behind her right.",
  "she pays $4.99 per month for a service that has never been identified.",
  "her passport lists a second nationality from a country that is not recognized.",
  "her smoke detector chirps when she lies. It has never chirped."
];

/* ---------- shuffle & state ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
let deck, photoDeck, idx, yes, no;

const els = {
  card:document.getElementById('card'), photo:document.getElementById('photo'),
  issue:document.getElementById('issue'), fill:document.getElementById('fill'),
  count:document.getElementById('count'), stampYes:document.getElementById('stampYes'),
  stampNo:document.getElementById('stampNo'), btns:document.getElementById('btns'),
  hint:document.getElementById('hint'), results:document.getElementById('results'),
  roachPct:document.getElementById('roachPct'), verdict:document.getElementById('verdict'),
  rblurb:document.getElementById('rblurb'), sYes:document.getElementById('sYes'),
  sNo:document.getElementById('sNo')
};

function start(){
  deck = shuffle(ISSUES);
  photoDeck = shuffle(PHOTOS);
  idx = 0; yes = 0; no = 0;
  els.results.classList.remove('show');
  els.card.style.display = '';
  els.btns.style.display = '';
  els.hint.style.display = '';
  render();
}

function render(){
  const total = deck.length;
  els.fill.style.width = (idx/total*100) + '%';
  els.count.textContent = 'Prospect ' + (idx+1) + ' of ' + total;
  els.issue.textContent = deck[idx];
  const src = photoDeck[idx % photoDeck.length] + IMG_Q;
  els.photo.onerror = () => { els.photo.onerror = null; els.photo.src = fallbackFor(idx); };
  els.photo.src = src;
  els.card.classList.remove('out-yes','out-no','in');
  void els.card.offsetWidth;      // reflow to restart animation
  els.card.classList.add('in');
  els.card.style.transform = '';
  els.card.style.opacity = '';
  els.stampYes.style.opacity = 0;
  els.stampNo.style.opacity = 0;
}

function choose(said){
  if(said){ yes++; } else { no++; }
  els.card.classList.remove('in');
  els.card.classList.add(said ? 'out-yes' : 'out-no');
  setTimeout(() => {
    idx++;
    if(idx >= deck.length){ finish(); }
    else { render(); }
  }, 300);
}

function finish(){
  els.card.style.display = 'none';
  els.btns.style.display = 'none';
  els.hint.style.display = 'none';
  const total = yes + no;
  const pct = Math.round(yes/total*100);
  els.fill.style.width = '100%';
  els.count.textContent = 'Results are in';
  els.roachPct.textContent = pct + '%';
  els.sYes.textContent = yes;
  els.sNo.textContent = no;

  let verdict, blurb;
  if(pct === 100){
    verdict = "Total compatibility.";
    blurb = "You said yes to every item. No objection was recorded.";
  } else if(pct >= 75){
    verdict = "Strongly compatible.";
    blurb = "You accepted almost all of her. The exceptions were few and specific.";
  } else if(pct >= 50){
    verdict = "Compatible.";
    blurb = "You said yes more often than no. On balance, it holds.";
  } else if(pct >= 25){
    verdict = "Marginal.";
    blurb = "You said no to most of it. Whether the rest is enough is not something the test can answer.";
  } else {
    verdict = "Incompatible.";
    blurb = "You rejected nearly all of it. The result is not ambiguous.";
  }
  els.verdict.textContent = verdict;
  els.rblurb.textContent = blurb;
  els.results.classList.add('show');
}

/* ---------- input: buttons ---------- */
document.getElementById('btnYes').addEventListener('click', () => choose(true));
document.getElementById('btnNo').addEventListener('click', () => choose(false));
document.getElementById('again').addEventListener('click', start);

/* ---------- input: swipe ---------- */
let dragging=false, startX=0, dx=0;
const stage = els.card;
function down(x){ dragging=true; startX=x; dx=0; els.card.style.transition='none'; }
function move(x){
  if(!dragging) return;
  dx = x - startX;
  els.card.style.transform = 'translateX('+dx+'px) rotate('+(dx*0.05)+'deg)';
  els.stampYes.style.opacity = dx > 0 ? Math.min(dx/90,1) : 0;
  els.stampNo.style.opacity  = dx < 0 ? Math.min(-dx/90,1) : 0;
}
function up(){
  if(!dragging) return;
  dragging=false;
  els.card.style.transition='';
  if(Math.abs(dx) > 90){ choose(dx > 0); }
  else { els.card.style.transform=''; els.stampYes.style.opacity=0; els.stampNo.style.opacity=0; }
}
stage.addEventListener('touchstart', e=>down(e.touches[0].clientX), {passive:true});
stage.addEventListener('touchmove',  e=>move(e.touches[0].clientX), {passive:true});
stage.addEventListener('touchend',   up);
stage.addEventListener('mousedown',  e=>down(e.clientX));
window.addEventListener('mousemove', e=>move(e.clientX));
window.addEventListener('mouseup',   up);

/* keyboard */
window.addEventListener('keydown', e=>{
  if(mode!=='play') return;
  if(els.results.classList.contains('show')) return;
  if(e.key==='ArrowRight'||e.key==='y'||e.key==='Y') choose(true);
  if(e.key==='ArrowLeft' ||e.key==='n'||e.key==='N') choose(false);
});

/* ================= Train mode ================= */
/* Swipe the prompts themselves as good/bad to curate the bank. Ratings persist
   in localStorage and export as JSON to inform future questions. */
let mode = 'play';

const t = {
  card: document.getElementById('tcard'), issue: document.getElementById('tissue'),
  fill: document.getElementById('tfill'), count: document.getElementById('tcount'),
  results: document.getElementById('tresults'),
  stampGood: document.getElementById('tStampGood'), stampBad: document.getElementById('tStampBad'),
  stampMaybe: document.getElementById('tStampMaybe'),
  btns: document.getElementById('tbtns'), hint: document.getElementById('thint'),
  note: document.getElementById('tnote'), noteQ: document.getElementById('tnoteQ'),
  noteText: document.getElementById('tnoteText'), noteSave: document.getElementById('tnoteSave'),
  noteCancel: document.getElementById('tnoteCancel'),
  good: document.getElementById('tGood'), maybe: document.getElementById('tMaybe'),
  bad: document.getElementById('tBad'), rest: document.getElementById('tRest'),
  lists: document.getElementById('tlists'),
  copy: document.getElementById('tCopy'), download: document.getElementById('tDownload'),
  resume: document.getElementById('tResume'), reset: document.getElementById('tReset'),
  exportLink: document.getElementById('tExport')
};

/* ratings shape: { [prompt]: { verdict:'good'|'bad'|'maybe', note:'' } } */
const LS_KEY = 'pg_train_ratings_v2';
function loadRatings(){
  try{ const v2 = JSON.parse(localStorage.getItem(LS_KEY)); if(v2) return v2; }catch(e){}
  try{  // migrate v1 (string verdicts, no notes)
    const v1 = JSON.parse(localStorage.getItem('pg_train_ratings_v1'));
    if(v1){ const out={}; for(const k in v1){ out[k]={verdict:v1[k], note:''}; } return out; }
  }catch(e){}
  return {};
}
function saveRatings(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(tRatings)); } catch(e){} }
function tV(x){ const r = tRatings[x]; return r && r.verdict; }
function tN(x){ const r = tRatings[x]; return (r && r.note) || ''; }

let tRatings = loadRatings();
let tDeck = ISSUES.slice();
let tIdx = 0, tInited = false, tNoteOpen = false;

function tRatedCount(){ return tDeck.reduce((n,x)=> n + (tV(x) ? 1 : 0), 0); }

function tRender(){
  const total = tDeck.length, cur = tDeck[tIdx];
  t.fill.style.width = (tIdx/total*100) + '%';
  t.count.textContent = 'Question ' + (tIdx+1) + ' of ' + total + ' · ' + tRatedCount() + ' rated'
    + (tV(cur) ? ' · currently ' + tV(cur) : '');
  t.issue.textContent = cur;
  t.card.classList.remove('out-yes','out-no','out-up','in');
  void t.card.offsetWidth;
  t.card.classList.add('in');
  t.card.style.transform=''; t.card.style.opacity='';
  t.stampGood.style.opacity=0; t.stampBad.style.opacity=0; t.stampMaybe.style.opacity=0;
}

function tSet(verdict, note){ tRatings[tDeck[tIdx]] = { verdict: verdict, note: note || '' }; saveRatings(); }

function tAdvance(dir){   // 'yes' | 'no' | 'up'
  t.card.classList.remove('in');
  t.card.classList.add(dir==='no' ? 'out-no' : (dir==='up' ? 'out-up' : 'out-yes'));
  setTimeout(()=>{ tIdx++; if(tIdx >= tDeck.length) tFinish(); else tRender(); }, 300);
}

function tChoose(verdict){
  if(verdict==='maybe'){ tOpenNote(); return; }
  tSet(verdict);
  tAdvance(verdict==='good' ? 'yes' : 'no');
}

function tOpenNote(){
  tNoteOpen = true;
  const cur = tDeck[tIdx];
  t.noteQ.textContent = 'Perfect girl, but… ' + cur;
  t.noteText.value = tV(cur)==='maybe' ? tN(cur) : '';
  t.card.style.transition=''; t.card.style.transform='';   // snap card back into place
  t.stampGood.style.opacity=0; t.stampBad.style.opacity=0; t.stampMaybe.style.opacity=0;
  t.btns.style.display='none'; t.hint.style.display='none'; t.note.style.display='block';
  t.noteText.focus();
}
function tCloseNote(){
  tNoteOpen = false;
  t.note.style.display='none'; t.btns.style.display=''; t.hint.style.display='';
}
t.noteSave.addEventListener('click', ()=>{ tSet('maybe', t.noteText.value.trim()); tCloseNote(); tAdvance('up'); });
t.noteCancel.addEventListener('click', ()=>{ tCloseNote(); t.card.style.transform=''; });
t.noteText.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ e.preventDefault(); t.noteCancel.click(); }
  if(e.key==='Enter' && (e.metaKey||e.ctrlKey)){ e.preventDefault(); t.noteSave.click(); }
});

function tCards(){
  tCloseNote();
  t.results.classList.remove('show');
  t.card.style.display=''; t.btns.style.display=''; t.hint.style.display='';
  tRender();
}

function tFinish(){
  tCloseNote();
  t.card.style.display='none'; t.btns.style.display='none'; t.hint.style.display='none';
  t.fill.style.width='100%';
  t.count.textContent = 'Ratings so far';
  tUpdateResults();
  t.results.classList.add('show');
}

function tStart(){
  tRatings = loadRatings();
  tDeck = ISSUES.slice();
  const i = tDeck.findIndex(x=>!tV(x));
  if(i < 0){ tIdx = tDeck.length; tFinish(); }   // everything already rated
  else { tIdx = i; tCards(); }                    // resume at first unrated
}

function tListEl(title, arr, withNotes){
  const wrap = document.createElement('div'); wrap.className = 'tlist';
  const h = document.createElement('div'); h.className = 'tlist-h';
  h.textContent = title + ' (' + arr.length + ')'; wrap.appendChild(h);
  arr.forEach(x=>{
    const p = document.createElement('div'); p.className = 'tlist-i'; p.textContent = x; wrap.appendChild(p);
    if(withNotes && tN(x)){ const n = document.createElement('div'); n.className='tlist-note'; n.textContent = '“' + tN(x) + '”'; wrap.appendChild(n); }
  });
  return wrap;
}

function tUpdateResults(){
  const good  = tDeck.filter(x=>tV(x)==='good');
  const maybe = tDeck.filter(x=>tV(x)==='maybe');
  const bad   = tDeck.filter(x=>tV(x)==='bad');
  t.good.textContent = good.length;
  t.maybe.textContent = maybe.length;
  t.bad.textContent = bad.length;
  t.rest.textContent = tDeck.length - good.length - maybe.length - bad.length;
  t.lists.innerHTML = '';
  t.lists.appendChild(tListEl('Good', good, false));
  t.lists.appendChild(tListEl('Maybe', maybe, true));
  t.lists.appendChild(tListEl('Bad', bad, false));
}

function tPayload(){
  const good  = tDeck.filter(x=>tV(x)==='good');
  const bad   = tDeck.filter(x=>tV(x)==='bad');
  const maybe = tDeck.filter(x=>tV(x)==='maybe').map(x=>({ text:x, note: tN(x) }));
  return {
    ratedAt: new Date().toISOString(),
    counts: { good: good.length, maybe: maybe.length, bad: bad.length,
              unrated: tDeck.length - good.length - maybe.length - bad.length, total: tDeck.length },
    good, maybe, bad, ratings: tRatings
  };
}

function tFlash(btn, msg){ const o = btn.textContent; btn.textContent = msg; setTimeout(()=>{ btn.textContent = o; }, 1200); }

t.copy.addEventListener('click', async ()=>{
  const json = JSON.stringify(tPayload(), null, 2);
  try { await navigator.clipboard.writeText(json); tFlash(t.copy, 'Copied ✓'); }
  catch(e){
    const ta = document.createElement('textarea'); ta.value = json;
    ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); tFlash(t.copy, 'Copied ✓'); } catch(_){ tFlash(t.copy, 'Copy failed'); }
    ta.remove();
  }
});

t.download.addEventListener('click', ()=>{
  const json = JSON.stringify(tPayload(), null, 2);
  const blob = new Blob([json], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'perfect-girl-ratings.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(a.href);
});

t.resume.addEventListener('click', ()=>{ tIdx = 0; tCards(); });
t.reset.addEventListener('click', ()=>{
  if(confirm('Clear all saved ratings?')){ tRatings = {}; saveRatings(); tStart(); }
});
t.exportLink.addEventListener('click', tFinish);

document.getElementById('btnGood').addEventListener('click', ()=>tChoose('good'));
document.getElementById('btnBad').addEventListener('click', ()=>tChoose('bad'));
document.getElementById('btnMaybe').addEventListener('click', ()=>tChoose('maybe'));

/* train swipe — left = bad, right = good, up = maybe */
let tDrag=false, tSX=0, tSY=0, tDX=0, tDY=0;
function tDown(x,y){ if(tNoteOpen) return; tDrag=true; tSX=x; tSY=y; tDX=0; tDY=0; t.card.style.transition='none'; }
function tMove(x,y){
  if(!tDrag) return;
  tDX = x - tSX; tDY = y - tSY;
  if(tDY < 0 && Math.abs(tDY) > Math.abs(tDX)){            // dragging up → maybe
    t.card.style.transform = 'translateY('+tDY+'px) rotate('+(tDX*0.02)+'deg)';
    t.stampMaybe.style.opacity = Math.min(-tDY/90, 1);
    t.stampGood.style.opacity = 0; t.stampBad.style.opacity = 0;
  } else {                                                  // horizontal → good/bad
    t.card.style.transform = 'translateX('+tDX+'px) rotate('+(tDX*0.05)+'deg)';
    t.stampGood.style.opacity = tDX > 0 ? Math.min(tDX/90,1) : 0;
    t.stampBad.style.opacity  = tDX < 0 ? Math.min(-tDX/90,1) : 0;
    t.stampMaybe.style.opacity = 0;
  }
}
function tUp(){
  if(!tDrag) return;
  tDrag=false; t.card.style.transition='';
  if(tDY < 0 && Math.abs(tDY) > Math.abs(tDX) && Math.abs(tDY) > 80){ tChoose('maybe'); }
  else if(Math.abs(tDX) > 90){ tChoose(tDX > 0 ? 'good' : 'bad'); }
  else { t.card.style.transform=''; t.stampGood.style.opacity=0; t.stampBad.style.opacity=0; t.stampMaybe.style.opacity=0; }
}
t.card.addEventListener('touchstart', e=>tDown(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
t.card.addEventListener('touchmove',  e=>tMove(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
t.card.addEventListener('touchend',   tUp);
t.card.addEventListener('mousedown',  e=>tDown(e.clientX, e.clientY));
window.addEventListener('mousemove', e=>tMove(e.clientX, e.clientY));
window.addEventListener('mouseup',   tUp);

window.addEventListener('keydown', e=>{
  if(mode!=='train' || tNoteOpen) return;
  if(t.results.classList.contains('show')) return;
  if(e.key==='ArrowRight'||e.key==='g'||e.key==='G') tChoose('good');
  if(e.key==='ArrowLeft' ||e.key==='b'||e.key==='B') tChoose('bad');
  if(e.key==='ArrowUp'   ||e.key==='m'||e.key==='M') tChoose('maybe');
});

/* ---------- tabs ---------- */
function setMode(m){
  mode = m;
  document.querySelectorAll('.tab').forEach(b=> b.classList.toggle('active', b.dataset.mode===m));
  document.getElementById('playView').hidden  = (m!=='play');
  document.getElementById('trainView').hidden = (m!=='train');
  document.querySelector('.sub').textContent = (m==='train')
    ? 'Rate the questions — good or bad' : 'Would you still say yes?';
  if(m==='train' && !tInited){ tInited = true; tStart(); }
}
document.querySelectorAll('.tab').forEach(b=> b.addEventListener('click', ()=> setMode(b.dataset.mode)));

start();
</script>
</body>
</html>
