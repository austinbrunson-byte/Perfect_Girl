<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="85%">
      <stop offset="0" stop-color="#4a1330"/>
      <stop offset="1" stop-color="#12040c"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff86bd"/>
      <stop offset="1" stop-color="#ff4f9a"/>
    </linearGradient>
    <radialGradient id="iris" cx="50%" cy="34%" r="70%">
      <stop offset="0" stop-color="#fff3b8"/>
      <stop offset="0.38" stop-color="#ff8fc4"/>
      <stop offset="0.78" stop-color="#ff3d8b"/>
      <stop offset="1" stop-color="#a3164f"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background (iOS rounds the corners itself) -->
  <rect width="128" height="128" fill="url(#bg)"/>

  <!-- back hair -->
  <path d="M28 66c0-24 16-42 36-42s36 18 36 42c0 20-6 30-6 42H34c0-12-6-22-6-42z" fill="url(#hair)"/>

  <!-- face -->
  <path d="M42 58c0-16 10-27 22-27s22 11 22 27c0 17-11 29-22 29S42 75 42 58z" fill="#fbe3d0"/>

  <!-- blush -->
  <ellipse cx="49" cy="71" rx="6" ry="4" fill="#ff9ec4" opacity="0.7"/>
  <ellipse cx="79" cy="71" rx="6" ry="4" fill="#ff9ec4" opacity="0.7"/>

  <!-- ===== eyes (big anime style) ===== -->
  <g id="eyeL">
    <!-- eye white -->
    <path d="M45 63c0-5.5 3.6-9.5 8-9.5s8 4 8 9.5-3.6 10-8 10-8-4.5-8-10z" fill="#fff"/>
    <!-- iris -->
    <circle cx="53" cy="63.5" r="7.3" fill="url(#iris)"/>
    <!-- lower iris glow -->
    <ellipse cx="53" cy="68.5" rx="5" ry="2.4" fill="#ffe08a" opacity="0.55"/>
    <!-- pupil -->
    <ellipse cx="53" cy="64" rx="2.9" ry="3.9" fill="#1a0210"/>
    <!-- big catchlight -->
    <circle cx="50" cy="60" r="2.7" fill="#fff"/>
    <!-- small catchlight -->
    <circle cx="55.4" cy="66.6" r="1.5" fill="#fff" opacity="0.95"/>
    <!-- bold upper lash line + outer flick -->
    <path d="M43.5 60c0.5-5.2 4.5-8.6 9.5-8.6 4.6 0 8.2 2.8 9.4 7.2-2.4-3.6-5.6-5-9-5-3.8 0-7.2 1.9-9 6.6-0.4-0.2-1-0.2-0.9-0.2z" fill="#2a0316"/>
    <path d="M43.6 59.4c-1.6-0.2-3-1.4-3.9-3.4 1.8 0.7 3.2 1.6 4.3 3z" fill="#2a0316"/>
    <!-- lower lash hint -->
    <path d="M46.5 70.5c2 1.4 10 1.4 12.4 0" fill="none" stroke="#7a2a44" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
  </g>
  <use href="#eyeL" transform="translate(128,0) scale(-1,1)"/>

  <!-- front bangs (over the top of the eyes) -->
  <path d="M40 56c2-20 12-32 24-32s22 12 24 32c-6-8-13-11-13-11-3 6-6 8-6 8s-3-6-5-8c0 0-4 6-8 8 0 0-3-4-4-8 0 0-8 3-12 11z" fill="url(#hair)"/>

  <!-- side hair strands -->
  <path d="M40 56c-3 14-3 30 0 44 4-4 6-10 6-20s-4-20-6-24z" fill="url(#hair)"/>
  <path d="M88 56c3 14 3 30 0 44-4-4-6-10-6-20s4-20 6-24z" fill="url(#hair)"/>

  <!-- mouth -->
  <path d="M59 77c2.5 3 8 3 10 0" fill="none" stroke="#d21e3d" stroke-width="2.4" stroke-linecap="round"/>

  <!-- heart accent -->
  <path d="M96 34c2-3 7-3 7 1 0 3-4 6-7 8-3-2-7-5-7-8 0-4 5-4 7-1z" fill="#ff4f9a"/>
</svg>
